# Argo CD 가 watch 하는 GitOps 소스. CI(.github/workflows/deploy.yml)가 빌드 후
# `kustomize edit set image ...` 로 아래 images 의 newTag(=commit sha)를 갱신 커밋한다.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: apps
resources:
- manifest.yaml
images:
- name: inhology-api
  newName: ghcr.io/maskun2/inhology-api
  newTag: a3b990c7078149cc51788c68a0725dc2d2fb2ddb
- name: inhology-web
  newName: ghcr.io/maskun2/inhology-web
  newTag: a3b990c7078149cc51788c68a0725dc2d2fb2ddb
