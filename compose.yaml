services:
  postgres:
    image: postgres:17-alpine
    container_name: inhology-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: inho
      POSTGRES_PASSWORD: inho
      POSTGRES_DB: inhology
    ports:
      - "5432:5432"
    volumes:
      - inhology-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inho -d inhology"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  inhology-pgdata:
