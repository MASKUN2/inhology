<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>새 글 쓰기 · inhology</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#111;background:#fff;line-height:1.6}
  @media(prefers-color-scheme:dark){body{color:#eee;background:#111}}
  a{color:inherit;text-decoration:none}
  button,input,select,textarea{font:inherit;color:inherit;background:transparent;border:1px solid gray;padding:.5rem .75rem;width:100%}
  button{width:auto;cursor:pointer;padding:.3rem .7rem}
  .wrap{max-width:672px;margin:0 auto;padding:3rem 1.5rem}
  .toolbar{display:flex;align-items:center;justify-content:space-between}
  h1{font-size:1.5rem;font-weight:700;margin:0}
  .actions{display:flex;gap:1rem;align-items:center;font-size:.85rem;opacity:.9}
  .form{display:flex;flex-direction:column;gap:1rem;margin-top:2rem}
  .row{display:flex;gap:.75rem}
  .w24{width:6rem;flex:none}
  .editor{border:1px solid gray}
  .editor-bar{display:flex;align-items:center;gap:.5rem;padding:.5rem;border-bottom:1px solid gray;font-size:.8rem}
  .seg button{border:1px solid gray;padding:.2rem .6rem;font-size:.8rem}
  .seg button.active{font-weight:700;text-decoration:underline}
  .img-btn{border:1px solid gray;padding:.2rem .6rem;font-size:.8rem}
  textarea.body{border:none;padding:.75rem;font-family:ui-monospace,monospace;font-size:.9rem;min-height:15rem;resize:vertical}
  .preview{padding:.75rem;min-height:15rem;display:none}
  .btn{border:1px solid gray;padding:.55rem 1rem}
  code{border:1px solid gray;padding:0 .25em;font-family:ui-monospace,monospace;font-size:.9em}
  .note{border:1px solid #2563eb;color:#2563eb;padding:.9rem 1.1rem;margin-bottom:2rem;font-size:.85rem}
  @media(prefers-color-scheme:dark){.note{border-color:#7ab8ff;color:#7ab8ff}}
  .note a{color:inherit;text-decoration:underline}
  .note h3{font-size:.9rem;margin:.5rem 0}
  .note ul{margin:.4rem 0 0;padding-left:1.15rem}
  .note li{margin:.3rem 0}
  .note code{border:1px solid currentColor;padding:0 .25em}
  @media(max-width:520px){.row{flex-direction:column}.w24{width:100%}}
</style>
</head>
<body>
<main class="wrap">
  <aside class="note">
    <a href="index.html">← UI 화면 목록</a>
    <h3>이 화면 — 새 글 쓰기 (<code>/admin/new</code>)</h3>
    <ul>
      <li>글을 새로 작성하는 폼입니다(§4.1).</li>
      <li>제목(필수)·요약(선택)·카테고리(필수)·(시리즈가 있을 때만 노출되는) 시리즈+순서, 본문 에디터, 상태(초안/발행)로 구성됩니다.</li>
      <li>에디터 툴바의 편집 | 미리보기 토글은 공개 글과 같은 렌더러로 미리보기를 보여줍니다.</li>
      <li>"이미지 추가"는 업로드 후 커서에 <code>![](…)</code>를 삽입합니다(§7.5).</li>
      <li>아래 토글은 최소 JS로 시연합니다.</li>
    </ul>
  </aside>

  <div class="toolbar">
    <h1>새 글 쓰기</h1>
    <div class="actions"><a href="08-post-dashboard.html">← 목록</a><button type="button">로그아웃</button></div>
  </div>

  <form class="form">
    <input placeholder="제목" required>
    <input placeholder="요약 (선택)">

    <select required>
      <option value="" disabled selected>카테고리 선택</option>
      <option>개발</option><option>일상</option><option>에세이</option>
    </select>

    <div class="row">
      <select><option value="">시리즈 없음</option><option>홈랩 구축기</option><option>이 블로그를 만들며</option></select>
      <input class="w24" type="number" min="0" placeholder="순서">
    </div>

    <div class="editor">
      <div class="editor-bar">
        <span class="seg">
          <button type="button" class="active" onclick="setMode('edit')">편집</button>
          <button type="button" onclick="setMode('preview')">미리보기</button>
        </span>
        <button type="button" class="img-btn">이미지 추가</button>
      </div>
      <textarea class="body" id="body" placeholder="마크다운으로 본문을 작성하세요. 이미지는 붙여넣기·드래그·파일 선택으로 추가됩니다."></textarea>
      <div class="preview" id="preview"><em style="opacity:.7">내용이 없습니다.</em></div>
    </div>

    <select><option selected>초안</option><option>발행</option></select>
    <button class="btn" type="button">저장</button>
  </form>
</main>

<script>
  function setMode(m){
    var seg=document.querySelectorAll('.seg button');
    seg[0].classList.toggle('active',m==='edit');
    seg[1].classList.toggle('active',m==='preview');
    var ta=document.getElementById('body'), pv=document.getElementById('preview');
    if(m==='preview'){
      ta.style.display='none'; pv.style.display='block';
      var t=ta.value.trim();
      pv.innerHTML = t ? t.replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]}).replace(/\n/g,'<br>') : '<em style="opacity:.7">내용이 없습니다.</em>';
    }else{ ta.style.display='block'; pv.style.display='none'; }
  }
</script>
</body>
</html>
